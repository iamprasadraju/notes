<header class="main-header">
  <div class="header-left">
    <button
      class="header-btn sidebar-toggle-btn"
      data-action="toggle-sidebar-left"
      aria-label="Toggle sidebar"
      title="Toggle sidebar"
    >
      <span class="icon-hamburger">
        <svg viewBox="0 0 24 24">
          <path
            fill="currentColor"
            d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"
          />
        </svg>
      </span>
      <span class="icon-close">
        <svg viewBox="0 0 24 24">
          <path
            fill="currentColor"
            d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"
          />
        </svg>
      </span>
    </button>
  </div>

  <div class="header-actions">
    {% if site.obsidian.search.enabled != false %}
    <button
      class="search-trigger"
      data-action="open-search"
      aria-label="Search"
    >
      <svg viewBox="0 0 24 24">
        <path
          fill="currentColor"
          d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
        />
      </svg>
      <span class="search-placeholder">Search notes...</span>
      <kbd class="search-shortcut" id="search-shortcut-label">Ctrl+K</kbd>
    </button>
    {% endif %} {% if site.obsidian.graph.enabled %}
    <button
      class="header-btn"
      data-action="open-graph"
      aria-label="Graph view"
      title="Graph view"
    >
      <svg viewBox="0 0 24 24">
        <circle cx="5" cy="6" r="2.5" fill="currentColor" />
        <circle cx="19" cy="6" r="2.5" fill="currentColor" />
        <circle cx="12" cy="18" r="2.5" fill="currentColor" />
        <line
          x1="5"
          y1="6"
          x2="19"
          y2="6"
          stroke="currentColor"
          stroke-width="1.5"
        />
        <line
          x1="5"
          y1="6"
          x2="12"
          y2="18"
          stroke="currentColor"
          stroke-width="1.5"
        />
        <line
          x1="19"
          y1="6"
          x2="12"
          y2="18"
          stroke="currentColor"
          stroke-width="1.5"
        />
      </svg>
    </button>
    {% endif %}

    <button
      class="header-btn sidebar-right-toggle"
      data-action="toggle-sidebar-right"
      aria-label="Toggle right sidebar"
    >
      <svg viewBox="0 0 24 24">
        <path
          fill="currentColor"
          d="M3 3h18v18H3V3zm2 2v14h6V5H5zm8 0v14h6V5h-6z"
          opacity="0.5"
        />
        <path fill="currentColor" d="M15 5h4v14h-4V5z" />
      </svg>
    </button>
  </div>
</header>

<!-- Mobile header -->
<div class="mobile-header">
  <button
    class="mobile-menu-btn"
    data-action="toggle-sidebar-left"
    aria-label="Toggle sidebar"
  >
    <svg viewBox="0 0 24 24">
      <path
        fill="currentColor"
        d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"
      />
    </svg>
  </button>
  <div style="flex: 1"></div>
  <div class="header-actions">
    <button class="header-btn theme-toggle-mobile" data-action="toggle-theme" aria-label="Toggle theme">
      <svg class="icon-sun" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z" />
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" style="display: none">
        <path fill="currentColor" d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z" />
      </svg>
    </button>
    {% if site.obsidian.search.enabled != false %}
    <button class="header-btn" data-action="open-search" aria-label="Search">
      <svg viewBox="0 0 24 24">
        <path
          fill="currentColor"
          d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
        />
      </svg>
    </button>
    {% endif %} {% if site.obsidian.graph.enabled %}
    <button class="header-btn" data-action="open-graph" aria-label="Graph view">
      <svg viewBox="0 0 24 24">
        <circle cx="5" cy="6" r="2.5" fill="currentColor" />
        <circle cx="19" cy="6" r="2.5" fill="currentColor" />
        <circle cx="12" cy="18" r="2.5" fill="currentColor" />
        <line x1="5" y1="6" x2="19" y2="6" stroke="currentColor" stroke-width="1.5" />
        <line x1="5" y1="6" x2="12" y2="18" stroke="currentColor" stroke-width="1.5" />
        <line x1="19" y1="6" x2="12" y2="18" stroke="currentColor" stroke-width="1.5" />
      </svg>
    </button>
    {% endif %}
    <button class="header-btn" data-action="toggle-sidebar-right" aria-label="Note Details">
      <svg viewBox="0 0 24 24">
        <path fill="currentColor" d="M3 3h18v18H3V3zm2 2v14h6V5H5zm8 0v14h6V5h-6z" opacity="0.5" />
        <path fill="currentColor" d="M15 5h4v14h-4V5z" />
      </svg>
    </button>
  </div>
</div>
