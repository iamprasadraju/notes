<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <title>
    {% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}
  </title>
  <meta
    name="description"
    content="{{ page.description | default: site.description | strip_html | truncatewords: 50 }}"
  />
  <link
    rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>"
  />

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M%S' }}" />

  {% if site.obsidian.search.enabled != false %}
  <script
    src="{{ '/assets/js/vendor/fuse.min.js' | relative_url }}"
    defer
  ></script>
  {% endif %}

  <script src="{{ '/assets/js/obsidian.js' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M%S' }}" defer></script>

  {% if site.obsidian.mermaid %}
  <script
    src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"
    defer
  ></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (typeof mermaid !== "undefined") {
        mermaid.initialize({
          startOnLoad: true,
          theme:
            document.documentElement.getAttribute("data-theme") === "dark"
              ? "dark"
              : "default",
        })
      }
    })
  </script>
  {% endif %} {% if site.obsidian.mathjax %}
  <script>
    MathJax = {
      tex: {
        inlineMath: [
          ["$", "$"],
          ["\\(", "\\)"],
        ],
      },
      svg: { fontCache: "global" },
    }
  </script>
  <script
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"
    defer
  ></script>
  {% endif %} {% seo %}
</head>
